# Dev overrides — exposes ports to host and enables hot reload.
# This file is loaded automatically by docker compose in development.
# DO NOT commit secrets here. Use a .env file.
services:
  redis:
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console (dev only — remove in production)

  backend:
    build:
      target: dev
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    build:
      target: dev
    volumes:
      - ./frontend/src:/app/src:ro
    ports:
      - "127.0.0.1:3000:3000"

  # Adminer — dev only, never expose in production
  adminer:
    image: adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
